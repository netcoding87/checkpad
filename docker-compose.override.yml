services:
  checkpad-app-postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${APP_DB_NAME}
      POSTGRES_PASSWORD: ${APP_DB_PASSWORD}
      POSTGRES_USER: ${APP_DB_USER}
    volumes:
      - app_postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
    command:
      - -c
      - listen_addresses=*
      - -c
      - wal_level=logical
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${APP_DB_USER} -d ${APP_DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  checkpad-keycloak-postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data
    tmpfs:
      - /tmp
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"

  electric:
    depends_on:
      checkpad-app-postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  keycloak:
    depends_on:
      checkpad-keycloak-postgres:
        condition: service_healthy
    ports:
      - "9090:8080"

  pgadmin:
    depends_on:
      checkpad-app-postgres:
        condition: service_healthy
    ports:
      - "5050:80"

volumes:
  app_postgres_data:
  keycloak_postgres_data:
